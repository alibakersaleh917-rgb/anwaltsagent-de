name: produktionsausfall-industrial
visual_mood: "dark-industrial-monitoring"

typography:
  font_family: "Inter, ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif"
  article_font_family: "Inter, ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif"

palette:
  bg: "#07090d"
  bg_soft: "#0f141b"
  card: "rgba(20, 27, 36, 0.82)"
  card_strong: "rgba(26, 35, 47, 0.95)"
  text: "#e8eef7"
  text_muted: "#9dafc8"
  line: "rgba(118, 143, 173, 0.28)"
  brand_1: "#3f87ff"
  brand_2: "#1db5a8"
  accent: "#ff9f45"
  success: "#34d399"

background:
  body_gradient_1: "radial-gradient(1100px 650px at 10% -20%, rgba(63,135,255,0.25), transparent 60%)"
  body_gradient_2: "radial-gradient(980px 520px at 100% 0%, rgba(29,181,168,0.18), transparent 63%)"
  header_gradient: "linear-gradient(180deg, rgba(7,9,13,0.9), rgba(7,9,13,0.72))"
  hero_card_gradient: "linear-gradient(155deg, rgba(63,135,255,0.22), rgba(29,181,168,0.12))"
  eyebrow_bg: "rgba(63,135,255,0.14)"
  cta_gradient: "linear-gradient(140deg, rgba(63,135,255,0.2), rgba(255,159,69,0.15))"
  pill_gradient: "linear-gradient(135deg, var(--brand), var(--brand-2))"
  brand_text_gradient: "linear-gradient(90deg, var(--brand), var(--brand-2))"

borders:
  card_border: "1px solid rgba(137, 166, 201, 0.3)"
  pill_border: "1px solid rgba(220,235,255,0.24)"
  section_border: "1px solid var(--line)"

effects:
  shadow: "0 24px 70px rgba(0, 0, 0, 0.5)"
  glow: "radial-gradient(circle, rgba(29,181,168,0.28), transparent 72%)"
  pill_shadow: "0 10px 30px rgba(63,135,255,0.22)"

card_style:
  radius: "16px"
  hero_radius: "22px"

button_style:
  pill_radius: "999px"
  ghost_bg: "rgba(255,255,255,0.035)"
