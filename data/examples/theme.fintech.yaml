name: fintech-template
visual_mood: "neon-finance"

typography:
  font_family: "Inter, ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif"
  article_font_family: "Inter, ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif"

palette:
  bg: "#070b17"
  bg_soft: "#0f1528"
  card: "rgba(20, 28, 50, 0.78)"
  card_strong: "rgba(22, 34, 60, 0.95)"
  text: "#eef3ff"
  text_muted: "#a3b5da"
  line: "rgba(156, 178, 255, 0.27)"
  brand_1: "#605dff"
  brand_2: "#20d9ff"
  accent: "#ff4fd8"
  success: "#22c55e"

background:
  body_gradient_1: "radial-gradient(1200px 700px at 15% -20%, rgba(96,93,255,0.3), transparent 60%)"
  body_gradient_2: "radial-gradient(950px 520px at 98% 0%, rgba(32,217,255,0.2), transparent 62%)"
  header_gradient: "linear-gradient(180deg, rgba(7,11,23,0.9), rgba(7,11,23,0.66))"
  hero_card_gradient: "linear-gradient(155deg, rgba(96,93,255,0.32), rgba(32,217,255,0.14))"
  eyebrow_bg: "rgba(96,93,255,0.16)"
  cta_gradient: "linear-gradient(140deg, rgba(96,93,255,0.2), rgba(255,79,216,0.14))"
  pill_gradient: "linear-gradient(135deg, var(--brand), var(--brand-2))"
  brand_text_gradient: "linear-gradient(90deg, var(--brand), var(--brand-2))"

borders:
  card_border: "1px solid rgba(191, 207, 255, 0.28)"
  pill_border: "1px solid rgba(255,255,255,0.24)"
  section_border: "1px solid var(--line)"

effects:
  shadow: "0 24px 68px rgba(0, 0, 0, 0.48)"
  glow: "radial-gradient(circle, rgba(255,79,216,0.3), transparent 72%)"
  pill_shadow: "0 10px 30px rgba(32,217,255,0.24)"

card_style:
  radius: "18px"
  hero_radius: "24px"

button_style:
  pill_radius: "999px"
  ghost_bg: "rgba(255,255,255,0.035)"
